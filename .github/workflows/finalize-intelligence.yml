name: Finalize intelligence dependencies

on:
  push:
    branches:
      - fix/security-data-integrity

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message != 'Finalize intelligence dependencies'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/security-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Remove obsolete SDK and normalize package metadata
        run: |
          npm uninstall @google/genai
          npm pkg set name=aetherglobe version=4.3.0
      - name: Validate final dependency tree
        run: |
          npm run lint
          npm run build
      - name: Commit generated package files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No dependency changes to commit."
          else
            git commit -m "Finalize intelligence dependencies"
            git push origin HEAD:fix/security-data-integrity
          fi

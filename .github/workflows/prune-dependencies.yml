name: Prune dependencies

on:
  push:
    branches:
      - fix/security-data-integrity

permissions:
  contents: write

jobs:
  prune:
    if: github.event.head_commit.message != 'Prune unused dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/security-data-integrity

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Remove unused direct dependencies
        run: >-
          npm uninstall
          @react-three/drei
          @react-three/fiber
          @supabase/supabase-js
          axios
          clsx
          react-use-websocket
          tailwind-merge
          ws
          @types/ws

      - name: Validate cleaned dependency tree
        run: |
          npm run lint
          npm run build

      - name: Commit lockfile cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No dependency changes to commit."
          else
            git commit -m "Prune unused dependencies"
            git push origin HEAD:fix/security-data-integrity
          fi

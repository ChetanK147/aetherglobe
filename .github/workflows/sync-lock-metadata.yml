name: Sync lock metadata

on:
  push:
    branches:
      - fix/security-data-integrity

permissions:
  contents: write

jobs:
  sync:
    if: github.event.head_commit.message != 'Sync package lock metadata'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/security-data-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Commit lock metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Lock metadata already synchronized."
          else
            git commit -m "Sync package lock metadata"
            git push origin HEAD:fix/security-data-integrity
          fi

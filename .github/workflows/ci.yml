name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify Netlify deployment files
        run: |
          test -f netlify.toml
          test -f netlify/functions/api.ts
          test -f lib/api.ts
      - name: Smoke test source-backed intelligence
        env:
          OPENAI_API_KEY: ''
        run: |
          npm run dev > /tmp/aetherglobe.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          curl --max-time 35 -fsS \
            -X POST http://127.0.0.1:3000/api/intelligence \
            -H 'Content-Type: application/json' \
            -d '{"lat":19.9975,"lng":73.7898,"context":"CI fallback check"}' \
            > /tmp/intelligence.json

          node --input-type=module -e "
            import fs from 'node:fs';
            const health = JSON.parse(fs.readFileSync('/tmp/health.json', 'utf8'));
            const intelligence = JSON.parse(fs.readFileSync('/tmp/intelligence.json', 'utf8'));
            if (health.intelligenceMode !== 'local-source-summary') throw new Error('Unexpected health intelligence mode');
            if (health.configuredModel !== 'gpt-5.2') throw new Error('Unexpected default OpenAI model');
            if (health.fallbackModel !== 'gpt-5-mini') throw new Error('Unexpected fallback OpenAI model');
            if (intelligence.mode !== 'local-fallback') throw new Error('Fallback mode was not used');
            if (typeof intelligence.report !== 'string' || intelligence.report.length < 100) throw new Error('Intelligence report missing');
          "

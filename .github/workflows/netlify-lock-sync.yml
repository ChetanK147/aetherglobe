name: Sync Netlify function types

on:
  push:
    branches: [feat/netlify-openai]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/netlify-openai
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --save-dev @netlify/functions@latest
      - name: Commit synchronized metadata and remove this workflow
        run: |
          rm .github/workflows/netlify-lock-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/netlify-lock-sync.yml
          git commit -m "Add Netlify function types"
          git push origin HEAD:feat/netlify-openai
